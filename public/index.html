<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConvertIt - YouTube to MP4</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">Convert<span>It</span></h1>
            <p>Szybki i prosty konwerter YouTube do MP4 HD</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="videoUrl" placeholder="Wklej link z YouTube tutaj..." />
                <button id="convertBtn">Konwertuj</button>
            </div>

            <div id="loader" class="hidden">
                <div class="spinner"></div>
                <p>Pobieranie informacji o filmie...</p>
            </div>

            <div id="result" class="hidden">
                <div class="video-card">
                    <img id="thumbnail" src="" alt="Thumbnail" />
                    <div class="video-info">
                        <h2 id="videoTitle"></h2>
                        <div class="download-options">
                            <select id="qualitySelect"></select>
                            <button id="downloadBtn">Pobierz MP4</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="error" class="hidden error-message"></div>
        </main>

        <footer>
            <p>&copy; 2026 ConvertIt. Wszystkie prawa zastrzeżone.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
